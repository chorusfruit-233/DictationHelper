name: Build & Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Publish as GitHub Release'
        type: boolean
        default: false
      bundle_vosk:
        description: 'Also build APK with pre-installed Vosk models (CN+EN)'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/dictation-helper.jks

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build standard APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: dictation-helper.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Move standard APK
        run: |
          mv app/build/outputs/apk/release/*.apk \
            "DictationHelper-v${{ steps.version.outputs.version }}.apk"

      - name: Restore Vosk model cache
        if: ${{ inputs.bundle_vosk }}
        id: vosk-cache
        uses: actions/cache@v4
        with:
          path: /tmp/vosk-cache
          key: vosk-models-cn-en

      - name: Restore Gradle config cache
        uses: actions/cache@v4
        with:
          path: .gradle/configuration-cache
          key: gradle-config-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-config-

      - name: Download Vosk models
        if: ${{ inputs.bundle_vosk && steps.vosk-cache.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p /tmp/vosk-cache
          echo "Downloading vosk-model-small-cn-0.22 (~42MB)..."
          curl -L --connect-timeout 30 --max-time 600 \
            "https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip" \
            -o /tmp/vosk-cache/vosk_cn.zip
          echo "Downloading vosk-model-small-en-us-0.15 (~40MB)..."
          curl -L --connect-timeout 30 --max-time 600 \
            "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip" \
            -o /tmp/vosk-cache/vosk_en.zip

      - name: Extract Vosk models to assets
        if: ${{ inputs.bundle_vosk }}
        run: |
          mkdir -p app/src/main/assets/vosk_model_cn
          unzip -q /tmp/vosk-cache/vosk_cn.zip -d /tmp/vosk_cn
          mv /tmp/vosk_cn/*/* app/src/main/assets/vosk_model_cn/

          mkdir -p app/src/main/assets/vosk_model_en
          unzip -q /tmp/vosk-cache/vosk_en.zip -d /tmp/vosk_en
          mv /tmp/vosk_en/*/* app/src/main/assets/vosk_model_en/

      - name: Build APK with models
        if: ${{ inputs.bundle_vosk }}
        run: |
          ./gradlew assembleRelease
          mv app/build/outputs/apk/release/*.apk \
            "DictationHelper-v${{ steps.version.outputs.version }}-with-models.apk"
        env:
          KEYSTORE_FILE: dictation-helper.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DictationHelper-v${{ steps.version.outputs.version }}
          path: "*.apk"

      - name: Create Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          files: "*.apk"
          tag_name: v${{ steps.version.outputs.version }}
          name: DictationHelper v${{ steps.version.outputs.version }}
          body: |
            ### 构建时间
            ${{ github.event.repository.updated_at }}

            ### APK
            - `DictationHelper-v${{ steps.version.outputs.version }}.apk` — 标准版
            ${{ inputs.bundle_vosk && format('- `DictationHelper-v{0}-with-models.apk` — 预装中/英文离线语音模型', steps.version.outputs.version) || '' }}
          draft: false
          prerelease: false
