name: Build & Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Publish as GitHub Release'
        type: boolean
        default: false
      bundle_vosk_cn:
        description: 'Pre-install Vosk CN model (~42MB)'
        type: boolean
        default: false
      bundle_vosk_en:
        description: 'Pre-install Vosk EN model (~40MB)'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/dictation-helper.jks

      - name: Bundle Vosk CN model
        if: ${{ inputs.bundle_vosk_cn }}
        run: |
          echo "Downloading vosk-model-small-cn-0.22 (~42MB)..."
          mkdir -p app/src/main/assets/vosk_model_cn
          curl -L --connect-timeout 30 --max-time 600 \
            "https://alphacephei.com/vosk/models/vosk-model-small-cn-0.22.zip" \
            -o /tmp/vosk_cn.zip
          unzip -q /tmp/vosk_cn.zip -d /tmp/vosk_cn
          mv /tmp/vosk_cn/*/* app/src/main/assets/vosk_model_cn/
          echo "CN model bundled: $(find app/src/main/assets/vosk_model_cn -type f | wc -l) files"

      - name: Bundle Vosk EN model
        if: ${{ inputs.bundle_vosk_en }}
        run: |
          echo "Downloading vosk-model-small-en-us-0.15 (~40MB)..."
          mkdir -p app/src/main/assets/vosk_model_en
          curl -L --connect-timeout 30 --max-time 600 \
            "https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip" \
            -o /tmp/vosk_en.zip
          unzip -q /tmp/vosk_en.zip -d /tmp/vosk_en
          mv /tmp/vosk_en/*/* app/src/main/assets/vosk_model_en/
          echo "EN model bundled: $(find app/src/main/assets/vosk_model_en -type f | wc -l) files"

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: dictation-helper.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DictationHelper-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ### 构建参数
            - 预装中文模型: ${{ inputs.bundle_vosk_cn }}
            - 预装英文模型: ${{ inputs.bundle_vosk_en }}
          draft: false
          prerelease: false
